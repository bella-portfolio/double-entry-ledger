name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: ledger
          POSTGRES_USER: ledger
          POSTGRES_PASSWORD: ledger123
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
      - uses: gradle/actions/setup-gradle@v4
      - name: Build with Gradle
        env:
          DB_USER: ledger
          DB_PASSWORD: ledger123
          DB_URL: jdbc:postgresql://localhost:5432/ledger
        run: ./gradlew build --no-daemon -x test -x compileTestKotlin
